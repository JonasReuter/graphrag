services:
  arangodb:
    image: arangodb:3.12
    container_name: graphrag-arangodb
    ports:
      - "8529:8529"
    command: ["arangod", "--vector-index", "true"]
    environment:
      ARANGO_ROOT_PASSWORD: "graphrag"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps

volumes:
  arangodb_data:
  arangodb_apps:
